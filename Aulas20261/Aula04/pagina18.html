<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página 18</title>
  </head>

  <body>
    <h1>Método Math.pow()</h1>  

    <script>
      let b = Number(prompt('Digite a base:', ''))
      let e = Number(prompt('Digite o expoente:', ''))

      let r = Math.pow(b, e)

      document.write(`<p>${b} elevado a ${e} é igual a ${r}</p>`)
    </script>
  </body>
</html>
