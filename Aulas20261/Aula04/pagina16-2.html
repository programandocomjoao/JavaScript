<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página 16</title>

  <body>
    <h1>Método Math.random()</h1>  

    <script>
      let n1 = Math.random()
      let n2 = Math.random() * 7
      let n3 = Math.random() * 99 + 1
      let n4 = Math.random() * 25 + 54

      n1 = Math.round(n1)
      n2 = Math.round(n2)
      n3 = Math.round(n3)
      n4 = Math.round(n4)
    </script>

    <p>Número entre 0 e 1: <script>document.write(n1)</script></p>
    <p>Número entre 0 e 7: <script>document.write(n2)</script></p>
    <p>Número entre 1 e 100: <script>document.write(n3)</script></p>
    <p>Número entre 54 e 79: <script>document.write(n4)</script></p>
  </body>
</html>
