<!DOCTYPE html>
  <html lang="pt-br">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página 43</title>
  </head>

  <body>
    <h1>Manipulação de Arrays</h1>  

    <script>
      let numeros = new Array(10)

      for(let i = 0; i < numeros.length; i++)
        numeros[i] = Number(prompt(`Digite um número para posição ${i}:`, ''))
      
      document.write(`<p>Tamanho do array: ${numeros.length} posições</p>`)
    </script>

    <h2>Valores Iniciais do Vetor</h2>

    <ul>
      <script>
        for(let i = 0; i < numeros.length; i++)
          document.write(`<li>Posição ${i}: ${numeros[i]}</li>`)
      </script>
    </ul>

    <h2>Valores Invertidos no Vetor</h2>

    <ul>
      <script>
        numeros.reverse()

        for(let i = 0; i < numeros.length; i++)
          document.write(`<li>Posição ${i}: ${numeros[i]}</li>`)
      </script>
    </ul>

    <h2>Valores Ordenados no Vetor</h2>

    <ul>
      <script>
        numeros.sort((a, b) => a - b)

        for(let i = 0; i < numeros.length; i++)
          document.write(`<li>Posição ${i}: ${numeros[i]}</li>`)
      </script>
    </ul>
  </body>
</html>
