<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página 37</title>
  </head>

  <body>
    <h1>Cadastro de Games</h1>

    <table border>
      <tr>
        <th>Game</th>
        <th>Ano</th>
        <th>Plataforma</th>
      </tr>

      <script>
        do {
          game = prompt('Digite o título do game:', '')
          ano = prompt('Digite o ano de lançamento:', '')
          plataforma = prompt('Digite a plataforma:', '')

          document.write('<tr>')
          document.write(`<td>${game}</td>`)
          document.write(`<td>${ano}</td>`)
          document.write(`<td>${plataforma}</td>`)
          document.write('</tr>')

          resposta = confirm('Deseja continuar?')
        } while(resposta)
      </script>
    </table>
  </body>
</html>
