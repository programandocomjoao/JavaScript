<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página 11</title>
  </head>

  <body>
    <h1>Concatenação de Strings</h1>

    <script>
      let n1 = Number(prompt('Digite um número:', ''))
      let n2 = Number(prompt('Digite outro número:', ''))

      document.write('<p>A soma entre ' + n1 + ' e ' + n2 + ' é igual a ' + (n1+n2) + '</p>')
      document.write('<p>A subtração entre ' + n1 + ' e ' + n2 + ' é igual a ' + (n1-n2) + '</p>')
      document.write('<p>O produto entre ' + n1 + ' e ' + n2 + ' é igual a ' + (n1*n2) + '</p>')
      document.write('<p>A divisão entre ' + n1 + ' e ' + n2 + ' é igual a ' + (n1/n2) + '</p>')
    </script>
   </body>
</html>
