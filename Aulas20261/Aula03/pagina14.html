<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página 14</title>
  </head>

  <body>
    <h1>Operadores Relacionais</h1>

    <script>
      let n1 = Number(prompt('Digite um número:', ''))
      let n2 = Number(prompt('Digite outro número:', ''))
    </script>

    <ul>
      <script>
        document.write(`<li>${n1} igual a ${n2} é ${n1 == n2}</li>`)
        document.write(`<li>${n1} diferente de ${n2} é ${n1 != n2}</li>`)
        document.write(`<li>${n1} maior que ${n2} é ${n1 > n2}</li>`)
        document.write(`<li>${n1} menor que ${n2} é ${n1 < n2}</li>`)
        document.write(`<li>${n1} maior ou igual a ${n2} é ${n1 >= n2}</li>`)
        document.write(`<li>${n1} menor ou igual a ${n2} é ${n1 <= n2}</li>`)
      </script>
    </ul>
   </body>
</html>
