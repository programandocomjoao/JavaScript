<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página 22</title>
  </head>

  <body>
    <h1>Números Inteiros e Absolutos</h1>

    <script>
      let n1 = Number(prompt('Digite um número real:', ''))
      let n2 = Number(prompt('Digite um número negativo:', ''))
    </script>

    <p>Antes do Trunc: <script>document.write(n1)</script></p>
    <p>Depois do Trunc: <script>document.write(Math.trunc(n1))</script></p>
    <hr>
    <p>Antes do Abs: <script>document.write(n2)</script></p>
    <p>Depois do Abs: <script>document.write(Math.abs(n2))</script></p>
  </body>
</html>
