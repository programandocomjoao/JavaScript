<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página 40</title>
    <script src="funcoesMat.js"></script>
  </head>

  <body>
    <h1>Cálculo do Delta</h1>

    <form>
      <fieldset>
        <legend>Dados para Calcular</legend>

        <p><label for="A">Valor de A:</label>
          <input type="text" id="A" size="5" autofocus>
        </p>

        <p><label for="B">Valor de B:</label>
          <input type="text" id="B" size="5">
        </p>

        <p><label for="C">Valor de C:</label>
          <input type="text" id="C" size="5">
        </p>

        <hr>
        <input type="button" value="Calcular Delta" onclick="
          let A = Number(document.getElementById('A').value)
          let B = Number(document.getElementById('B').value)
          let C = Number(document.getElementById('C').value)

          document.getElementById('resultado').value = calcularDelta(A, B, C)
        ">
        <hr>

        <p><label for="resultado">Delta:</label>
          <output id="resultado"></output>
        </p>
      </fieldset>
    </form>
  </body>
</html>
