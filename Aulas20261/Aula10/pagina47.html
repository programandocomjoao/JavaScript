<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página 47</title>
  </head>

  <body>
    <h1>Manipulando Matrizes</h1>
    
    <script>
      let numeros = new Array(2)

      numeros[0] = new Array(3)
      numeros[1] = new Array(3)

      numeros[0][0] = 3
      numeros[0][1] = 17
      numeros[0][2] = 23
      numeros[1][0] = 26
      numeros[1][1] = 38
      numeros[1][2] = 42
    </script>

    <table border>
      <tr>
        <td><script>document.write(numeros[0][0])</script></td>
        <td><script>document.write(numeros[0][1])</script></td>
        <td><script>document.write(numeros[0][2])</script></td>
      </tr>

      <tr>
        <td><script>document.write(numeros[1][0])</script></td>
        <td><script>document.write(numeros[1][1])</script></td>
        <td><script>document.write(numeros[1][2])</script></td>
      </tr>
    </table>
  </body>
</html>
