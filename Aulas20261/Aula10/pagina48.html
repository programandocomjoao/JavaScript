<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página 48</title>
  </head>

  <body>
    <h1>Manipulando Matrizes</h1>
    
    <script>
      let numeros = new Array(2)

      numeros[0] = new Array(3)
      numeros[1] = new Array(3)

      numeros[0][0] = 5
      numeros[0][1] = 13
      numeros[0][2] = 25
      numeros[1][0] = 68
      numeros[1][1] = 70
      numeros[1][2] = 79
    </script>

    <table border>
      <script>
        for(let i = 0; i < numeros.length; i++) {
          document.write('<tr>')
          document.write(`<td>${numeros[i][0]}</td>`)
          document.write(`<td>${numeros[i][1]}</td>`)
          document.write(`<td>${numeros[i][2]}</td>`)
          document.write('</tr>')
        }
      </script>
    </table>
  </body>
</html>
